<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi pollito ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            color: #ffeb3b;
            text-shadow: 0 0 20px #fbc02d;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 2s;
            padding: 0 20px;
        }

        .btn-inicio {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #fbc02d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(251, 192, 45, 0.5);
            color: #000;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .btn-inicio:hover {
            transform: scale(1.1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #lyrics {
            position: absolute;
            bottom: 12%;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 0 0 8px #ffeb3b;
            min-height: 1.5em;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="container">
        <button class="btn-inicio" id="btn" onclick="iniciar()">HAZ CLIC AQUÍ, MI POLLITO ❤️</button>
        <h1 id="mensaje">TE AMO MUCHO MI POLLITO ❤️</h1>
    </div>

    <div id="lyrics"></div>
    <canvas id="canvas"></canvas>

    <audio id="musica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const lyricsDiv = document.getElementById('lyrics');
        const musica = document.getElementById('musica');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function iniciar() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('mensaje').style.opacity = '1';
            
            // Intentar reproducir música
            musica.play().catch(e => console.log("Error al reproducir audio:", e));
            
            animar();
            mostrarLetras();
        }

        class Flor {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // Empezar en posiciones aleatorias
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 100;
                this.size = Math.random() * 20 + 15;
                this.speed = Math.random() * 1 + 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.02 - 0.01;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.fillStyle = "#ffeb3b";
                for (let i = 0; i < 6; i++) {
                    ctx.rotate(Math.PI / 3);
                    ctx.beginPath();
                    ctx.ellipse(0, this.size/2, this.size/4, this.size/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.beginPath();
                ctx.arc(0, 0, this.size/4, 0, Math.PI * 2);
                ctx.fillStyle = "#6d4c41"; // Centro más oscuro tipo girasol
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                this.y -= this.speed;
                this.angle += this.spin;
                if (this.y < -100) this.reset();
            }
        }

        const flores = Array.from({ length: 15 }, () => new Flor());

        function animar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flores.forEach(f => {
                f.update();
                f.draw();
            });
            requestAnimationFrame(animar);
        }

        function mostrarLetras() {
            const lineas = [
                { t: "Para la niña más linda del mundo...", d: 2000 },
                { t: "Estas flores amarillas son para ti 🌻", d: 5500 },
                { t: "Porque iluminas cada uno de mis días", d: 9000 },
                { t: "Gracias por ser mi pollito", d: 12500 },
                { t: "Eres mi regalo más grande", d: 16000 },
                { t: "Te amo hoy y siempre ❤️", d: 19500 }
            ];

            lineas.forEach(linea => {
                setTimeout(() => {
                    lyricsDiv.style.opacity = 0;
                    setTimeout(() => {
                        lyricsDiv.innerHTML = linea.t;
                        lyricsDiv.style.opacity = 1;
                        lyricsDiv.style.transition = "opacity 1.5s";
                    }, 500);
                }, linea.d);
            });
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
